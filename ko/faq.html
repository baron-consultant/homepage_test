<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon" />
    <title>FAQ | (주)바론컨설턴트</title>
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/font.css" />
    <link rel="stylesheet" href="../assets/css/lib/aos.min.css" />
    <link rel="stylesheet" href="../assets/css/lib/lenis.min.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/faq.css" />

    <script src="../assets/js/lib/aos.min.js"></script>
    <script src="../assets/js/lib/lenis.min.js"></script>
    <script src="../assets/js/lib/jquery-3.6.1.min.js"></script>
    <script src="../assets/js/lib/gsap.min.js"></script>
    <script src="../assets/js/lib/scrolltrigger.min.js"></script>
    <script src="../assets/js/lib/scrollToPlugin.min.js"></script>
    <script type="module" src="../assets/js/common.js?v=20260623-4"></script>
    <script defer src="../assets/js/faq.js"></script>
  </head>
  <body>
    <div class="wrap">
      <header id="header"></header>
      <ul class="map_list"></ul>

      <main class="container faq-page">
        <section class="faq-hero">
          <div class="faq-hero__inner">
            <div class="faq-hero__copy" data-aos="fade-up" data-aos-duration="800">
              <p class="faq-hero__eyebrow">Customer Support</p>
              <h1>FAQ</h1>
              <p class="faq-hero__desc">
                자주 묻는 질문을 빠르게 확인할 수 있도록 한 곳에 정리했습니다.
              </p>
            </div>
            <div class="faq-hero__media" data-aos="fade-left" data-aos-duration="900">
              <img
                src="../assets/img/sv/solution_intro_bg.jpg"
                alt="FAQ 대표 이미지"
              />
            </div>
          </div>
        </section>

        <section class="faq-board" data-aos="fade-up" data-aos-duration="800">
          <div class="faq-board__head">
            <div>
              <p class="faq-board__eyebrow">FAQ List</p>
              <h2>자주 묻는 질문</h2>
            </div>
            <p class="faq-board__meta">
              한 페이지에 최대 <strong>10개</strong>씩 표시됩니다.
            </p>
          </div>

          <ul class="faq-list" id="faqList" aria-live="polite"></ul>

          <nav class="faq-pagination" id="faqPagination" aria-label="FAQ 페이지 이동"></nav>
        </section>
      </main>

      <footer id="footer"></footer>
    </div>
  </body>
</html>
