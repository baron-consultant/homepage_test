name: Deploy Baron To Cloudflare R2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS CLI environment for R2
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.CF_R2_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.CF_R2_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=auto" >> $GITHUB_ENV
          echo "R2_ACCOUNT_ID=${{ secrets.CF_R2_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "R2_BUCKET=${{ secrets.CF_R2_BUCKET }}" >> $GITHUB_ENV

      - name: Verify AWS CLI
        run: aws --version

      - name: Validate R2 bucket access
        run: |
          trimmed_account_id="$(printf '%s' "$R2_ACCOUNT_ID" | tr -d '\r\n[:space:]')"
          trimmed_bucket="$(printf '%s' "$R2_BUCKET" | tr -d '\r\n')"
          endpoint="https://$trimmed_account_id.r2.cloudflarestorage.com"

          if [ -z "$trimmed_account_id" ]; then
            echo "::error::CF_R2_ACCOUNT_ID is empty. Set it to the Cloudflare account ID that owns the R2 bucket."
            exit 1
          fi

          if [ -z "$trimmed_bucket" ]; then
            echo "::error::CF_R2_BUCKET is empty. Set it to the exact R2 bucket name."
            exit 1
          fi

          if [ "$trimmed_bucket" != "$R2_BUCKET" ]; then
            echo "::warning::CF_R2_BUCKET contained trailing newline characters. The workflow trimmed them before validation."
          fi

          echo "Checking access to R2 bucket: $trimmed_bucket"

          if ! aws s3api list-objects-v2 \
            --bucket "$trimmed_bucket" \
            --max-items 1 \
            --endpoint-url "$endpoint" \
            > /tmp/r2-check.log 2>&1; then
            if grep -q "NoSuchBucket" /tmp/r2-check.log; then
              echo "::error::R2 bucket '$trimmed_bucket' was not found at account endpoint '$endpoint'. Check CF_R2_BUCKET for typos, confirm the bucket exists in the Cloudflare account from CF_R2_ACCOUNT_ID, and verify the access key was created in that same account."
            else
              echo "::error::Unable to access R2 bucket '$trimmed_bucket'. Confirm the R2 access key can list and write objects in this bucket. aws s3 sync requires ListObjectsV2 access before upload and delete operations."
            fi

            cat /tmp/r2-check.log
            exit 1
          fi

      - name: Sync Baron site to Cloudflare R2
        run: |
          aws s3 sync ./ s3://$R2_BUCKET \
            --endpoint-url https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md"

      - name: Deployment summary
        run: |
          echo "Deployed repository root to Cloudflare R2 bucket: $R2_BUCKET"
          echo "R2 endpoint: https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
