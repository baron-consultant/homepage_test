name: Deploy Baron To Cloudflare R2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS CLI environment for R2
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.CF_R2_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.CF_R2_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=auto" >> $GITHUB_ENV
          echo "R2_ACCOUNT_ID=${{ secrets.CF_R2_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "R2_BUCKET=${{ secrets.CF_R2_BUCKET }}" >> $GITHUB_ENV

      - name: Verify AWS CLI
        run: aws --version

      - name: Validate R2 bucket access
        run: |
          trimmed_account_id="$(printf '%s' "$R2_ACCOUNT_ID" | tr -d '\r\n[:space:]')"
          trimmed_bucket="$(printf '%s' "$R2_BUCKET" | tr -d '\r\n')"
          endpoint="https://$trimmed_account_id.r2.cloudflarestorage.com"

          if [ -z "$trimmed_account_id" ]; then
            echo "::error::CF_R2_ACCOUNT_ID is empty. Set it to the Cloudflare account ID that owns the R2 bucket."
            exit 1
          fi

          if [ -z "$trimmed_bucket" ]; then
            echo "::error::CF_R2_BUCKET is empty. Set it to the exact R2 bucket name."
            exit 1
          fi

          if [ "$trimmed_bucket" != "$R2_BUCKET" ]; then
            echo "::warning::CF_R2_BUCKET contained trailing newline characters. The workflow trimmed them before validation."
          fi

          echo "Checking access to R2 bucket: $trimmed_bucket"

          if ! aws s3api list-objects-v2 \
            --bucket "$trimmed_bucket" \
            --max-items 1 \
            --endpoint-url "$endpoint" \
            > /tmp/r2-check.log 2>&1; then
            if grep -q "NoSuchBucket" /tmp/r2-check.log; then
              echo "::error::R2 bucket '$trimmed_bucket' was not found at account endpoint '$endpoint'. Check CF_R2_BUCKET for typos, confirm the bucket exists in the Cloudflare account from CF_R2_ACCOUNT_ID, and verify the access key was created in that same account."
            else
              echo "::error::Unable to access R2 bucket '$trimmed_bucket'. Confirm the R2 access key can list and write objects in this bucket. aws s3 sync requires ListObjectsV2 access before upload and delete operations."
            fi

            cat /tmp/r2-check.log
            exit 1
          fi

      - name: Deploy changed files to Cloudflare R2
        run: |
          endpoint="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          should_skip() {
            case "$1" in
              .git/*|.github/*|*.md|img/*|*/img/*|"") return 0 ;;
              *) return 1 ;;
            esac
          }

          upload_file() {
            local path="$1"
            local cache_control=""

            case "$path" in
              *.html|assets/js/common.js|assets/js/common_eng.js|assets/js/eng/common.js|assets/js/egbim-baron-shell.js|ko/tova/js/common.js|en/tova/js/common.js|ko/egbim/js/common.js|en/egbim/js/common.js)
                cache_control="no-cache, no-store, must-revalidate"
                ;;
            esac

            if [ -n "$cache_control" ]; then
              aws s3 cp "$path" "s3://$R2_BUCKET/$path" \
                --endpoint-url "$endpoint" \
                --cache-control "$cache_control" \
                --only-show-errors
            else
              aws s3 cp "$path" "s3://$R2_BUCKET/$path" \
                --endpoint-url "$endpoint" \
                --only-show-errors
            fi
          }

          refresh_cache_sensitive_files() {
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              [ -f "$path" ] || continue
              echo "Refreshing cache headers for $path"
              upload_file "$path"
            done <<'EOF'
          assets/js/common.js
          assets/js/common_eng.js
          assets/js/eng/common.js
          assets/js/egbim-baron-shell.js
          ko/tova/js/common.js
          en/tova/js/common.js
          ko/egbim/js/common.js
          en/egbim/js/common.js
          EOF

            find . -type f \( -name '*.html' \) -print | sed 's#^./##' | while IFS= read -r path; do
              [ -n "$path" ] || continue
              should_skip "$path" && continue
              echo "Refreshing cache headers for $path"
              upload_file "$path"
            done
          }

          full_sync() {
            echo "Running full bucket sync"
            aws s3 sync ./ s3://$R2_BUCKET \
              --endpoint-url "$endpoint" \
              --delete \
              --exclude ".git/*" \
              --exclude ".github/*" \
              --exclude "img/*" \
              --exclude "*/img/*" \
              --exclude "*.md" \
              --only-show-errors

            refresh_cache_sensitive_files
          }

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "workflow_dispatch detected. Falling back to full sync."
            full_sync
            exit 0
          fi

          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push detected. Falling back to full sync."
            full_sync
            exit 0
          fi

          if ! git cat-file -e "$before_sha^{commit}" 2>/dev/null; then
            echo "Missing previous commit locally. Fetching $before_sha"
            git fetch --no-tags origin "$before_sha"
          fi

          changed_count=0
          deleted_count=0

          while IFS= read -r -d '' status; do
            old_path=""
            new_path=""

            case "$status" in
              R*|C*)
                IFS= read -r -d '' old_path || break
                IFS= read -r -d '' new_path || break
                ;;
              *)
                IFS= read -r -d '' new_path || break
                ;;
            esac

            case "$status" in
              A*|M*|T*|C*)
                if should_skip "$new_path"; then
                  continue
                fi

                if [ -f "$new_path" ]; then
                  echo "Uploading $new_path"
                  upload_file "$new_path"
                  changed_count=$((changed_count + 1))
                fi
                ;;
              D*)
                if should_skip "$new_path"; then
                  continue
                fi

                echo "Deleting $new_path"
                aws s3 rm "s3://$R2_BUCKET/$new_path" \
                  --endpoint-url "$endpoint" \
                  --only-show-errors
                deleted_count=$((deleted_count + 1))
                ;;
              R*)
                if ! should_skip "$old_path"; then
                  echo "Deleting renamed source $old_path"
                  aws s3 rm "s3://$R2_BUCKET/$old_path" \
                    --endpoint-url "$endpoint" \
                    --only-show-errors
                  deleted_count=$((deleted_count + 1))
                fi

                if should_skip "$new_path"; then
                  continue
                fi

                if [ -f "$new_path" ]; then
                  echo "Uploading renamed target $new_path"
                  upload_file "$new_path"
                  changed_count=$((changed_count + 1))
                fi
                ;;
            esac
          done < <(git diff --name-status --find-renames -z "$before_sha" "$after_sha")

          echo "Uploaded files: $changed_count"
          echo "Deleted files: $deleted_count"

          if [ "$changed_count" -eq 0 ] && [ "$deleted_count" -eq 0 ]; then
            echo "No deployable file changes detected."
          fi

      - name: Deployment summary
        run: |
          echo "Deployed changed files from repository root to Cloudflare R2 bucket: $R2_BUCKET"
          echo "R2 endpoint: https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
